owner: RevealUIStudio
repo: status

sites:
  # Marketing site (revealui.com — update URL once deployed)
  - name: Website
    url: https://revealui.com
    expectedStatusCodes:
      - 200
      - 301
      - 302

  # API health endpoint
  - name: API
    url: https://api.revealui.com/health
    expectedStatusCodes:
      - 200

  # Admin dashboard
  - name: Admin
    url: https://admin.revealui.com
    expectedStatusCodes:
      - 200
      - 301
      - 302

  # License validation endpoint (critical for Track C perpetual customers)
  - name: License Service
    url: https://api.revealui.com/api/license/verify
    method: HEAD
    expectedStatusCodes:
      - 200
      - 401
      - 405

status-website:
  # Use GitHub Pages URL until custom domain is configured
  # To use status.revealui.com: uncomment cname, add CNAME DNS record pointing to RevealUIStudio.github.io
  # cname: status.revealui.com
  baseUrl: /status
  logoUrl: https://raw.githubusercontent.com/RevealUIStudio/revealui/test/apps/marketing/public/favicon.svg
  name: RevealUI Status
  introTitle: "**RevealUI** system status and uptime history."
  introMessage: "Real-time monitoring powered by [Upptime](https://github.com/upptime/upptime). Incidents are tracked as [GitHub Issues](https://github.com/RevealUIStudio/status/issues)."
  navbar:
    - title: Status
      href: /
    - title: RevealUI
      href: https://revealui.com
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
  theme: light

# Check every 5 minutes (default). Public repo = unlimited GitHub Actions minutes.
workflowSchedule:
  uptime: "*/5 * * * *"
  graphs: "0 0 * * *"
  staticSite: "0 1 * * *"

# Open GitHub Issues on outages, assign to founder
assignees:
  - joshua-v-dev

# Notifications: email via GitHub issue notifications (free).
# Add Slack/Discord webhook later if needed.
